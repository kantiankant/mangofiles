# foot.ini — ported from ghostty config
# Because apparently one config format wasn't enough for anyone

[main]
font=GoMono Nerd Font:size=9.8
pad=20x20

[environment]
COLORFGBG=15;0

[bell]
# nothing here, just like the ghostty original

[cursor]
style=underline
blink=yes

[colors-dark]
background=000000
foreground=ffffff
cursor=ffffff ffffff
selection-foreground=cccccc
selection-background=333333
alpha=0.5

[tweak]
# confirm-close-surface=false has no direct equivalent; foot doesn't nag you
# about closing, which is one thing it gets right
